name: Operator
version: 1.0.0
main: mcbesser.operator.OperatorPlugin
api-version: "26.1.1"
authors:
  - McBesser
description: GUI for operators with teleport, plugin control and VanillaWorldEdit tools.
commands:
  operator:
    description: Opens the operator menu.
    usage: /operator [vwe|wand|tp <player>|tphere <player>|plugin <reload|enabled|disabled> <name>]
    permission: operator.use
permissions:
  operator.use:
    description: Allows access to the operator menu.
    default: op
